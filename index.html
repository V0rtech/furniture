<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dresser</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #F0F2FA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      padding: 18px 48px;
      border-radius: 100px;
      border: none;
      background: linear-gradient(135deg, #1A2F6B 0%, #4A6CF7 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 8px 32px rgba(26, 47, 107, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(26, 47, 107, 0.32);
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <a href="gallery.html" class="btn">Take me to the gallery</a>
</body>

</html>
